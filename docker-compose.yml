version: '3.8'

services:
  node1:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./config-1.yml:/app/config.yml
    environment:
      - PORT=8000
    command: python node/main.py run -c config.yml

  node2:
    build: .
    ports:
      - "8001:8000"
    volumes:
      - ./config-2.yml:/app/config.yml
    environment:
      - PORT=8000
    command: python node/main.py run -c config.yml
