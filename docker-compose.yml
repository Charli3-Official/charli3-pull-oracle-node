name: odv-multisig-charli3-node-operator-v1

services:
  node1:
    image: odv-multisig-charli3-node-operator-backend:latest
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./config-1.yml:/app/config.yml
    environment:
      - PORT=8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: python -m node.main run -c config.yml

  node2:
    image: odv-multisig-charli3-node-operator-backend:latest
    ports:
      - "8001:8000"
    volumes:
      - ./config-2.yml:/app/config.yml
    environment:
      - PORT=8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: python -m node.main run -c config.yml

  locust:
    build:
      context: .
      dockerfile: Dockerfile.locust
    ports:
      - "8089:8089"
    volumes:
      - ./locust.yml:/app/locust.yml
      - ./tests:/app/tests
    command: locust -f /app/tests/performance/locustfiles/feed_endpoint.py
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - node1
      - node2
